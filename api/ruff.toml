# Lint config — run from api/ with `ruff check .` (ruff comes from requirements-dev.txt).
line-length = 120
target-version = "py313"
exclude = ["migrations"]

[lint]
# Pyflakes (F): real defects — unused imports/variables, redefinitions, undefined
# names. E9/W6: syntax-level errors. Deliberately conservative: no style rules,
# so the linter only fails on things that are actually wrong.
select = ["F", "E9", "W6"]

[lint.per-file-ignores]
# __init__.py re-exports look "unused" to F401
"**/__init__.py" = ["F401"]
