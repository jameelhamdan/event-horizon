x-api-build: &api-build
  build: ./api
  image: event-horizon-api

services:
  frontend:
    build:
      context: ./ui
      args:
        VITE_GA_ID: ${VITE_GA_ID:-}
        VITE_DOMAIN: ${VITE_DOMAIN:-}
        VITE_APP_NAME: ${VITE_APP_NAME:-}
    command: sh -c "cp -r /app/dist/. /frontend_dist/"
    restart: "no"
    volumes:
      - ./frontend_dist:/frontend_dist

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "192.168.2.17:80:80"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./frontend_dist:/usr/share/nginx/html:ro
      - static_data:/django_static:ro
      - ./nginx/templates:/etc/nginx/templates:ro
    depends_on:
      frontend:
        condition: service_completed_successfully
      api:
        condition: service_started

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      nginx:
        condition: service_started

  api:
    <<: *api-build
    restart: always
    command: uvicorn app.asgi:application --host 0.0.0.0 --port 8000 --workers 4
    environment:
      - CRON_ENABLED=true
    expose:
      - "8000"
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
    env_file: .env.app
    volumes:
      - ./media_data:/app/media
      - static_data:/app/.static
    # 1g is generous for plain Django/uvicorn (no ML models load in this
    # codepath — that's all on the celery queues below); capped so a leak
    # can't pressure the host outside cgroup accounting. See the memory
    # budget note above worker-bulk for how this fits the full host.
    deploy:
      resources:
        limits:
          memory: 1g
    memswap_limit: 1g

  # Steady NLP work — 2 workers. Each prefork child lazily loads its own copy
  # of the local ML stack (MiniLM + FinBERT + MarianMT + NER + zero-shot
  # deberta-v3/bge-m3 — measured ~1.1GB RSS warm with all loaded and exercised;
  # the refine ensemble's second model pushes a busy child toward ~2GB), so RAM
  # scales with --concurrency. --concurrency=2 doubles annotate/refine throughput
  # (the 100k+ corpus reprocess is CPU-bound on this stage) now that the external
  # llm-api/ollama no longer shares this box and its ~16GB is free. Keep
  # --concurrency in sync with CELERY_QUEUE_WORKERS in api/settings/base.py.
  worker-heavy:
    <<: *api-build
    restart: always
    # max-memory-per-child (KB) recycles a child once its own RSS crosses
    # 2.4GB — over 2x the measured warm baseline, so normal operation never
    # trips it — a tighter, per-process complement to max-tasks-per-child
    # that catches a leak by memory instead of task count. With --concurrency=2
    # worst-case active RSS is ~2 × 2.4GB = 4.8GB; the container cap below is
    # sized well above that for fork/spike/recycle-overlap headroom.
    command: sh -c "celery -A app worker -Q heavy --concurrency=2 --pool=prefork -O fair --max-tasks-per-child=200 --max-memory-per-child=2400000 -n heavy@%h"
    environment:
      # Celery's prefork pool forks per-task worker processes — safety default
      # in case anything ever loads an HF tokenizer in the parent (its background
      # thread pool can deadlock a forked child otherwise).
      - TOKENIZERS_PARALLELISM=false
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
    env_file: .env.app
    volumes:
      - ./media_data:/app/media
    # 14g for 2 model children (~4.8GB worst-case active) — the rest is
    # leak/spike/recycle-overlap headroom. This is the only queue that runs
    # continuously (annotate + refine) and the throughput bottleneck for the
    # corpus reprocess, so it gets the largest slice of the freed budget — see
    # the accounting note above worker-bulk. memswap_limit == memory: no extra
    # swap beyond the hard cap, so an overrun is killed immediately instead of
    # swapping/thrashing the host into an unresponsive state.
    deploy:
      resources:
        limits:
          memory: 14g
    memswap_limit: 14g

  # Fast I/O (fetchers, stream collectors, dispatchers) — 4 workers.
  worker-light:
    <<: *api-build
    restart: always
    command: sh -c "celery -A app worker -Q default --concurrency=4 --pool=prefork -O fair --max-tasks-per-child=500 --max-memory-per-child=600000 -n light@%h"
    depends_on:
      - mongo
      - redis
    env_file: .env.app
    volumes:
      - ./media_data:/app/media
    # No ML models on this queue (fetch/stream/dispatch I/O only) — small cap.
    deploy:
      resources:
        limits:
          memory: 1g
    memswap_limit: 1g

  # Long one-shot jobs (multi-year backfills, model training) — 1 worker, isolated
  # so a hours-long job never blocks the live pipeline on the heavy queue.
  worker-bulk:
    <<: *api-build
    restart: always
    # max-memory-per-child is checked between tasks, not mid-task, so it can't
    # interrupt a single hours-long backfill/training run — it only guards
    # against a leak accumulating across several sequential bulk jobs.
    command: sh -c "celery -A app worker -Q bulk --concurrency=1 --pool=prefork -O fair --max-memory-per-child=4000000 -n bulk@%h"
    depends_on:
      - mongo
      - redis
    env_file: .env.app
    volumes:
      - ./media_data:/app/media
    # Single worker; jobs (backfills, LightGBM training) can spike, but this
    # queue is idle almost all the time — not the continuous live pipeline —
    # so it gets a smaller slice than worker-heavy. An overrun is OOM-killed
    # and retried: a contained, recoverable failure.
    #
    # Host memory budget (32GB total). The external llm-api/ollama no longer
    # shares this box, so its old ~16g reservation is free and goes to the two
    # services that gate corpus-reprocess throughput — worker-heavy (now
    # --concurrency=2) and mongo's WiredTiger cache. Current sum:
    #   api 1g + worker-heavy 14g + worker-light 1g + worker-bulk 2g +
    #   mongo 9g + redis 0.5g + flower 0.25g = 27.75g,
    # leaving ~4.25g for the host OS + Docker daemon (deliberate headroom).
    # Every cap has memswap_limit == memory (no swap beyond the hard cap, clean
    # OOM-kill instead of host-wide thrashing). If a service needs more, trim
    # another's cap first — the ~28g sum is the constraint, not any one line.
    deploy:
      resources:
        limits:
          memory: 2g
    memswap_limit: 2g

  # Celery ground truth — live worker/task state straight from broker events
  # (CELERY_WORKER_SEND_TASK_EVENTS), independent of TaskRun rows, which a
  # killed worker can leave stale. No published port: reachable only through
  # the staff-authenticated Django proxy at /flower/ (app/views.py).
  flower:
    <<: *api-build
    restart: always
    command: sh -c "celery -A app flower --address=0.0.0.0 --port=5555 --url_prefix=flower"
    expose:
      - "5555"
    depends_on:
      - redis
    env_file: .env.app
    environment:
      # Flower gates its REST /api/* endpoints (e.g. /api/queues/length, used
      # by the dashboard's queue-backlog panel) behind this even with no auth
      # configured. Safe here: same trust boundary as the rest of Flower — no
      # published port, reachable only through the staff-authenticated Django
      # proxy at /flower/ (app/views.py).
      - FLOWER_UNAUTHENTICATED_API=true
    deploy:
      resources:
        limits:
          memory: 256m
    memswap_limit: 256m

  # redis usage is normally tiny (SSE pub/sub + broker), but a stuck
  # consumer letting a channel's backlog grow could still pressure the host.
  # maxmemory + noeviction makes redis itself refuse new writes (visible,
  # recoverable) instead of growing past the container cap and getting
  # OOM-killed (opaque, drops in-flight broker/SSE state).
  redis:
    image: redis:7-alpine
    restart: always
    # AOF persistence (fsync every second) so the task broker survives a
    # container restart or power cut. Without this, redis started with no
    # volume/persistence at all — a crash lost every message still queued but
    # not yet picked up by a worker outright, since CELERY_TASK_ACKS_LATE only
    # protects messages already delivered to a worker, not ones that never
    # survived the restart in the first place. That's the gap that mattered
    # for the reprocess_corpus_task backfill actually resuming unattended
    # after a power cut instead of needing someone to notice and re-dispatch
    # it by hand.
    command: redis-server --maxmemory 384mb --maxmemory-policy noeviction --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 512m
    memswap_limit: 512m

  mongo:
    image: mongo:8.2
    restart: always
    # mongod auto-sizes its WiredTiger cache from *host* RAM (~50% of total)
    # unless told otherwise. On this 30GB shared box, with no container memory
    # limit, that meant a ~15GB cache target — mongod grew toward it until the
    # kernel OOM-killed it, and `restart: always` looped that every ~30s (1600+
    # unclean restarts in 13h). Two guards, both required:
    #   1. Cap the container so a runaway mongod can't starve the host. 9g now
    #      that the external llm-api/ollama has freed its slice — more cache
    #      keeps the 100k+ corpus's working set hot during reprocess/backfill.
    #   2. Size the WiredTiger cache to fit *inside* that cap rather than the
    #      host — Mongo's own guidance is ~50% of (RAM − 1GB) → 4GB here,
    #      leaving ~5g headroom for connections, journal, and other mongod
    #      overhead. Host auto-detection ignores the cgroup limit, so this must
    #      be set explicitly.
    command: mongod --wiredTigerCacheSizeGB 4
    ports:
      - "27017:27017"
    env_file: .env.db
    volumes:
      - /tank/event-horizon/mongo/data:/data/db
      - /tank/event-horizon/mongo/config:/data/configdb
    deploy:
      resources:
        limits:
          memory: 9g
    memswap_limit: 9g

volumes:
  static_data:
  redis_data:
