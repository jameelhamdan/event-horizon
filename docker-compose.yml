services:
  certbot:
    container_name: certbot
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"

  frontend:
    container_name: frontend
    build:
      context: ./ui
      args:
        VITE_GA_ID: ${VITE_GA_ID:-}
        VITE_DOMAIN: ${VITE_DOMAIN:-}
        VITE_APP_NAME: ${VITE_APP_NAME:-}
    command: sh -c "cp -r /app/dist/. /frontend_dist/"
    restart: "no"
    volumes:
      - ./frontend_dist:/frontend_dist

  nginx:
    container_name: nginx
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend_dist:/usr/share/nginx/html:ro
      - ./.static:/django_static:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    env_file: .env
    depends_on:
      frontend:
        condition: service_completed_successfully
      api:
        condition: service_started

  cloudflared:
    container_name: cloudflared
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      nginx:
        condition: service_started

  api:
    container_name: api
    build: ./api
    restart: always
    command: bash -c "./release.sh && uvicorn app.asgi:application --host 0.0.0.0 --port 8000 --workers 4"
    expose:
      - "8000"
    depends_on:
      - mongo
      - redis
    env_file: .env.app
    volumes:
      - ./media_data:/app/media
      - ./.static:/app/.static

  worker-heavy:
    container_name: worker-heavy
    build: ./api
    restart: always
    command: sh -c "python manage.py rqworker heavy"
    depends_on:
      - mongo
      - redis
    env_file: .env.app
    volumes:
      - ./media_data:/app/media

  worker-light:
    container_name: worker-light
    build: ./api
    restart: always
    command: sh -c "python manage.py rqworker default"
    depends_on:
      - mongo
      - redis
    env_file: .env.app
    volumes:
      - ./media_data:/app/media

  scheduler:
    container_name: scheduler
    build: ./api
    restart: always
    command: sh -c "python manage.py setup_schedule && rqscheduler --url $${REDIS_URL:-redis://redis:6379/0}"
    depends_on:
      - mongo
      - redis
    env_file: .env.app
    volumes:
      - ./media_data:/app/media

  redis:
    container_name: redis
    image: redis:7-alpine
    restart: always

  mongo:
    container_name: mongo
    image: mongo:8.2
    restart: always
    ports:
      - "27017:27017"
    env_file: .env.db
    volumes:
      - ./mongo/data:/data/db
      - ./mongo/config:/data/configdb
    deploy:
      resources:
        limits:
          memory: 512m
