services:
  frontend:
    build:
      context: ./ui
      args:
        VITE_GA_ID: ${VITE_GA_ID:-}
        VITE_DOMAIN: ${VITE_DOMAIN:-}
        VITE_APP_NAME: ${VITE_APP_NAME:-}
    command: sh -c "cp -r /app/dist/. /frontend_dist/"
    restart: "no"
    volumes:
      - ./frontend_dist:/frontend_dist

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "192.168.2.17:80:80"
    volumes:
      - ./frontend_dist:/usr/share/nginx/html:ro
      - static_data:/django_static:ro
      - ./nginx/templates:/etc/nginx/templates:ro
    depends_on:
      frontend:
        condition: service_completed_successfully
      api:
        condition: service_started

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      nginx:
        condition: service_started

  api:
    build: ./api
    restart: always
    command: uvicorn app.asgi:application --host 0.0.0.0 --port 8000 --workers 4
    expose:
      - "8000"
    depends_on:
      - mongo
      - redis
    env_file: .env.app
    volumes:
      - ./media_data:/app/media
      - static_data:/app/.static

  worker-heavy:
    build: ./api
    restart: always
    command: sh -c "python manage.py rqworker heavy"
    depends_on:
      - mongo
      - redis
    env_file: .env.app
    volumes:
      - ./media_data:/app/media

  worker-light:
    build: ./api
    restart: always
    command: sh -c "python manage.py rqworker default"
    depends_on:
      - mongo
      - redis
    env_file: .env.app
    volumes:
      - ./media_data:/app/media

  scheduler:
    build: ./api
    restart: always
    command: sh -c "python manage.py setup_schedule && rqscheduler --url $${REDIS_URL:-redis://redis:6379/0}"
    depends_on:
      - mongo
      - redis
    env_file: .env.app
    volumes:
      - ./media_data:/app/media

  g4f:
    # gpt4free OpenAI-compatible proxy — registration-free LLM provider.
    # OPTIONAL: gated behind the `g4f` compose profile so the stack does not depend
    # on it at startup. For production, prefer a reliable provider (OpenRouter) as the
    # primary route in settings.LLM_ROUTES and keep g4f only as a fallback chain entry.
    #   • default `docker compose up`        → g4f NOT started; LLM calls route to OpenRouter
    #   • `docker compose --profile g4f up`   → bundles g4f at http://g4f:1337/v1
    # When enabling, set G4F_BASE_URL=http://g4f:1337/v1 in .env.app (the localhost default
    # is for running manage.py outside Docker). Use the full `hlohaus789/g4f:latest` image
    # instead of -slim if you need the browser-based providers (heavier; bundles Chromium).
    image: hlohaus789/g4f:latest-slim
    profiles: ["g4f"]
    restart: always
    expose:
      - "1337"

  redis:
    image: redis:7-alpine
    restart: always

  mongo:
    image: mongo:8.2
    restart: always
    ports:
      - "27017:27017"
    env_file: .env.db
    volumes:
      - /tank/conflictradar-live/mongo/data:/data/db
      - /tank/conflictradar-live/mongo/config:/data/configdb
    deploy:
      resources:
        limits:
          memory: 1g

volumes:
  static_data:
