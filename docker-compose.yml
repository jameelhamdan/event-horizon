x-api-build: &api-build
  build: ./api
  image: event-horizon-api

services:
  frontend:
    build:
      context: ./ui
      args:
        VITE_GA_ID: ${VITE_GA_ID:-}
        VITE_DOMAIN: ${VITE_DOMAIN:-}
        VITE_APP_NAME: ${VITE_APP_NAME:-}
    command: sh -c "cp -r /app/dist/. /frontend_dist/"
    restart: "no"
    volumes:
      - ./frontend_dist:/frontend_dist

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "192.168.2.17:80:80"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./frontend_dist:/usr/share/nginx/html:ro
      - static_data:/django_static:ro
      - ./nginx/templates:/etc/nginx/templates:ro
    depends_on:
      frontend:
        condition: service_completed_successfully
      api:
        condition: service_started

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      nginx:
        condition: service_started

  api:
    <<: *api-build
    restart: always
    command: uvicorn app.asgi:application --host 0.0.0.0 --port 8000 --workers 4
    environment:
      - CRON_ENABLED=true
    expose:
      - "8000"
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
    env_file: .env.app
    volumes:
      - ./media_data:/app/media
      - static_data:/app/.static

  # Steady NLP/LLM work — 2 workers (matches the LLM key/proxy rotation depth).
  worker-heavy:
    <<: *api-build
    restart: always
    command: sh -c "celery -A app worker -Q heavy --concurrency=2 --pool=prefork -O fair -n heavy@%h"
    environment:
      # Celery's prefork pool forks per-task worker processes — safety default
      # in case anything ever loads an HF tokenizer in the parent (its background
      # thread pool can deadlock a forked child otherwise).
      - TOKENIZERS_PARALLELISM=false
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
    env_file: .env.app
    volumes:
      - ./media_data:/app/media

  # Fast I/O (fetchers, stream collectors, dispatchers) — 4 workers.
  worker-light:
    <<: *api-build
    restart: always
    command: sh -c "celery -A app worker -Q default --concurrency=4 --pool=prefork -O fair -n light@%h"
    depends_on:
      - mongo
      - redis
    env_file: .env.app
    volumes:
      - ./media_data:/app/media

  # Long one-shot jobs (multi-year backfills, model training) — 1 worker, isolated
  # so a hours-long job never blocks the live pipeline on the heavy queue.
  worker-bulk:
    <<: *api-build
    restart: always
    command: sh -c "celery -A app worker -Q bulk --concurrency=1 --pool=prefork -O fair -n bulk@%h"
    depends_on:
      - mongo
      - redis
    env_file: .env.app
    volumes:
      - ./media_data:/app/media

  redis:
    image: redis:7-alpine
    restart: always

  mongo:
    image: mongo:8.2
    restart: always
    ports:
      - "27017:27017"
    env_file: .env.db
    volumes:
      - /tank/event-horizon/mongo/data:/data/db
      - /tank/event-horizon/mongo/config:/data/configdb
    deploy:
      resources:
        limits:
          memory: 1g

volumes:
  static_data:
