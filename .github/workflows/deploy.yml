# Deploy hook
name: notify-deploy

on:
  push:
    branches: [master]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger homelab deploy
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.HOMELAB_DISPATCH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/jameelhamdan/homelab/dispatches \
            -d '{"event_type":"event-horizon-deploy","client_payload":{"sha":"${{ github.sha }}"}}'
